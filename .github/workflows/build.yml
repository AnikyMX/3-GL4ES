name: Build GL4ES

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-library:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Android NDK r28c
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r28c
          link-to-sdk: false

      - name: Cache CMake Build
        uses: actions/cache@v4
        with:
          path: build
          key: cmake-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'src/CMakeLists.txt') }}
          restore-keys: cmake-${{ runner.os }}-

      - name: Build Native Library
        run: |
          set -euo pipefail

          export ANDROID_NDK_HOME="${{ steps.setup-ndk.outputs.ndk-path }}"
          NDK_TOOLCHAIN="$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake"

          C_FLAGS="-Ofast -march=armv8-a+simd+crypto -ffast-math -fno-math-errno -ffinite-math-only -fno-signed-zeros -fno-trapping-math -freciprocal-math -funroll-loops -fomit-frame-pointer -fno-stack-protector -flto=thin -fvisibility=hidden -fno-exceptions -fno-rtti"
          LINKER_FLAGS="-flto=thin -fuse-ld=lld -Wl,--gc-sections -Wl,--fix-cortex-a53-843419 -Wl,-O3 -Wl,--as-needed -Wl,--exclude-libs,ALL"

          cmake -S . -B build \
            -Wno-dev \
            -DCMAKE_TOOLCHAIN_FILE="$NDK_TOOLCHAIN" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DANDROID=ON \
            -DNO_GBM=ON \
            -DUSE_ANDROID_LOG=ON \
            -DDEFAULT_ES=3 \
            -G Ninja \
            -DCMAKE_C_FLAGS="$C_FLAGS" \
            -DCMAKE_SHARED_LINKER_FLAGS="$LINKER_FLAGS"

          ninja -C build -j$(nproc)

      - name: Strip & Rename Output
        run: |
          set -euo pipefail

          LIB_SRC=""
          for candidate in lib/libGL.so.1 lib/libGL.so build/lib/libGL.so.1 build/lib/libGL.so build/libGL.so.1 build/libGL.so; do
            [ -f "$candidate" ] && LIB_SRC="$candidate" && break
          done

          [ -z "$LIB_SRC" ] && { find . -name "*.so*" 2>/dev/null; exit 1; }

          LLVM_STRIP="${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip"
          "$LLVM_STRIP" --strip-all "$LIB_SRC" -o libgl4es.so

          file libgl4es.so | grep -q "ELF 64-bit" || exit 1

      - name: Upload libgl4es.so
        uses: actions/upload-artifact@v7
        with:
          path: libgl4es.so
          archive: false
          retention-days: 30
          if-no-files-found: error
